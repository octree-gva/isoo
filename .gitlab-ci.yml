stages:
  - check
  - publish

.development_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

.publish_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: always

.docker:
  image: docker:25.0.5-git
  tags:
    - vocacity
  before_script:
    - docker compose build app

erb-lint:
  extends:
    - .docker
    - .development_rules
  stage: check
  script:
    - docker compose run --rm --no-deps -e AUTH_DISABLED=1 app bundle exec erb_lint --lint-all

rubocop:
  extends:
    - .docker
    - .development_rules
  stage: check
  script:
    - docker compose run --rm --no-deps -e AUTH_DISABLED=1 app bundle exec rubocop

brakeman:
  extends:
    - .docker
    - .development_rules
  stage: check
  script:
    - docker compose run --rm --no-deps -e AUTH_DISABLED=1 app bundle exec rake security:scan

rspec:
  extends:
    - .docker
    - .development_rules
  stage: check
  script:
    - docker compose up -d memcached
    - docker compose run --rm --no-deps -e AUTH_DISABLED=1 app bundle exec rspec

i18n:
  extends:
    - .docker
    - .development_rules
  stage: check
  script:
    - docker compose run --rm --no-deps -e AUTH_DISABLED=1 app bundle exec rake i18n:check

publish:
  extends: .publish_rules
  stage: publish
  image: docker:25.0.5-git
  tags:
    - vocacity
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" \
        > ~/.docker/config.json
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker build \
          --file "$CI_PROJECT_DIR/Dockerfile" \
          --push \
          --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
          --tag "$CI_REGISTRY_IMAGE:lts-$CI_COMMIT_TAG" \
          "$CI_PROJECT_DIR"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker build \
          --file "$CI_PROJECT_DIR/Dockerfile" \
          --push \
          --tag "$CI_REGISTRY_IMAGE:latest" \
          --tag "$CI_REGISTRY_IMAGE:lts-latest" \
          "$CI_PROJECT_DIR"
      fi
