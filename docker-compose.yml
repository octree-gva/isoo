services:
  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
    expose:
      - "11211"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-9292}:${PORT:-9292}"
    volumes:
      - .:/app
      - ./tmp/data:/app/tmp/data
    environment:
      AUTH_DISABLED: ${AUTH_DISABLED:-0}
      RACK_ENV: ${RACK_ENV:-development}
      PORT: ${PORT:-9292}
      BIND: ${BIND:-0.0.0.0}
      DATA_PATH: /app/tmp/datai
      MEMCACHE_SERVER: ${MEMCACHE_SERVER:-memcached:11211}
      MEMCACHE_NAMESPACE: ${MEMCACHE_NAMESPACE:-isoo}
      SESSION_IDLE_TIMEOUT_SECONDS: ${SESSION_IDLE_TIMEOUT_SECONDS:-7200}
      CHROME_NO_SANDBOX: ${CHROME_NO_SANDBOX:-1}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-dev-encryption-secret-change-in-production}
      OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:8080}
      OIDC_ISSUER_INTERNAL: ${OIDC_ISSUER_INTERNAL:-http://zitadel:8080}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:${PORT:-9292}/auth/callback}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-for-local-docker-development-only-must-be-at-least-sixty-four-bytes}
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
      GIT_FORCE_PUSH: ${GIT_FORCE_PUSH:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-ISOO}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-isoo@local}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      WEBDAV_URL: ${WEBDAV_URL:-}
      WEBDAV_USERNAME: ${WEBDAV_USERNAME:-}
      WEBDAV_PASSWORD: ${WEBDAV_PASSWORD:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-isoo-data}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-0}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
    working_dir: /app
    depends_on:
      memcached:
        condition: service_started
      mailcatcher:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'curl -f "http://localhost:$${PORT:-9292}/health/ready"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  mailcatcher:
    image: schickling/mailcatcher
    restart: unless-stopped
    ports:
      - "1080:1080"
    expose:
      - "1025"

  zitadel-db:
    profiles: ["local-idp"]
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    volumes:
      - zitadel-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d zitadel -U postgres']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  zitadel:
    profiles: ["local-idp"]
    image: ghcr.io/zitadel/zitadel:v4.13.0
    restart: unless-stopped
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    ports:
      - "8080:8080"
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
      ZITADEL_DEFAULTINSTANCE_DOMAINPOLICY_SMTPSENDERADDRESSMATCHESINSTANCEDOMAIN: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Password1!"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: isoo-setup
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: ISOO setup automation
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: mailcatcher:1025
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER: ""
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: ""
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS: "false"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM: zitadel@localhost
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME: Zitadel
    volumes:
      - ./docker/zitadel/bootstrap:/zitadel/bootstrap
    depends_on:
      zitadel-db:
        condition: service_healthy
      mailcatcher:
        condition: service_started
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

volumes:
  zitadel-db-data:
