---
schema_version: '1'
kind: form
response_kind: table
primary_key: level_of_compliance
columns:
- key: last_accessed_at
  label: DATE LAST ACCESSED
  type: date
  description: Last time this has been accessed
- key: iso_reference_version
  label: Reference Version
  type: text
  description: To what document this line does refers to
- key: clause_or_annex_control
  label: CLAUSE / ANNEX CONTROL
  type: text
  description: ISO 27001 Clause or ISO 27001 Annex A Control
- key: title
  label: TITLE
  type: text
  description: ISO 27001 Clause / ISO 27001 Annex A Control title
- key: control_objective
  label: CONTROL OBJECTIVE
  type: textarea
  description: What is the objective for the ISO 27001 Clause / ISO 27001 Annex A
    Control
- key: evaluation_method
  label: EVALUATION METHOD
  type: dropdown
  description: How do we evaluate this ISO 27001 Clause / ISO 27001 Annex A Control
  options:
  - Interview
  - Observation of process and activities
  - Review of documents and records
- key: positive_evidence_record
  label: POSITIVE EVIDENCE RECORD
  type: textarea
  description: Evidence record annexed
- key: negative_evidence_record
  label: NEGATIVE EVIDENCE RECORD
  type: textarea
  description: Evidence record annexed
- key: audit_rating
  label: AUDIT RATING
  type: dropdown
  description: How the audit do rate this ISO 27001 Clause / ISO 27001 Annex A Control.
  options:
  - Compliant
  - Observation
  - Minor Nonconformity
  - Major Nonconformity
  - Not audited
- key: interview_person
  label: WHO WAS AUDITED
  type: text
  description: Name of the person interviewed.
- key: interview_date
  type: text
  description: When was the interview.
- key: owner_name
  label: Document owner
  type: text
  required: true
- key: owner_email
  label: Owner email
  type: email
  required: true
_internal:
- key: _row_id
  type: uuid
- key: _deleted_at
  type: datetime
description: |
  #### What you use this for
  Blank audit worksheet — you map questions to controls yourself.

  #### When it counts
  Custom engagements or experienced auditors who bring their own structure.

  #### Connected artefacts
  - `audit-plan-iso-27002-2013-and-2022-version`
  - `audit-report-template`

  #### Review rhythm
  **Per audit**; template **annual**.
