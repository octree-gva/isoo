- level: h2
  key: description
  label: Overview
  role: body
  editable: true
  field_type: textarea
  required: false
  description: What could go wrong in this scenario.
- level: h2
  key: steps
  label: Steps
  role: body
  editable: true
  field_type: textarea
  required: false
  description: Steps taken or planned for this scenario.
- level: h2
  key: estimated_time
  label: Estimated time
  role: body
  editable: true
  field_type: textarea
  required: false
  description: Expected duration to complete recovery steps.
- level: h2
  key: rto
  label: RTO
  role: body
  editable: true
  field_type: textarea
  required: false
