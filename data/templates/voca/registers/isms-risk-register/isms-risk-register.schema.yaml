---
schema_version: '1'
kind: table
primary_key: risk_status
columns:
- key: risk_status
  label: RISK STATUS
  type: dropdown
  description: Current status of the risk.
  options:
  - Open
  - In treatment
  - Treated
  - Accepted
  - Closed
- key: risk_treatment
  label: RISK TREATMENT
  type: dropdown
  description: How the risk is being treated.
  options:
  - Avoid
  - Mitigate
  - Transfer
  - Accept
- key: risks_when_first_identified
  label: RISKS WHEN FIRST IDENTIFIED
  type: textarea
  description: Description of the risk when it was first logged.
- key: residual_risk
  label: RESIDUAL RISK
  type: textarea
  description: Remaining risk after controls are applied.
- key: owner_name
  label: Document owner
  type: text
  required: true
- key: owner_email
  label: Owner email
  type: email
  required: true
_internal:
- key: _row_id
  type: uuid
- key: _deleted_at
  type: datetime
description: |
  #### What you use this for
  Living list of risks, scores, owners, treatments, and residual status.

  #### When it counts
  Output of risk assessment; input to control selection and reviews.

  #### Connected artefacts
  - `ip-01-risk-management-procedure`
  - `statement-of-applicability-iso-27002-2022-and-2013`
  - `annual-risk-review-meeting-template`

  #### Review rhythm
  **Quarterly** touch; **annual** formal review.

  #### First move
  Ten honest risks beat fifty boilerplate rows.
