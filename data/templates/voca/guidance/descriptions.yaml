organisation-overview: |
  Use this to capture who your organisation is, what it does, and how it is structured. Complete it early in your ISMS journey so auditors and your team share the same baseline. Update it when ownership, locations, or core services change.

context-of-organisation: |
  Document the internal and external issues that affect your information security goals, as ISO 27001 clause 4.1 requires. Use it during initial scoping and revisit it at least annually or after major market, regulatory, or technology shifts. List stakeholders, trends, and constraints that shape your risk decisions.

0c-iso-27001-implementation-checklist: |
  A step-by-step roadmap for building your ISMS from scratch. Work through it in order during onboarding to avoid missing mandatory artefacts like scope, risk assessment, and the Statement of Applicability. Tick items off as you publish documents and gather evidence.

documented-isms-scope: |
  Defines exactly what your ISMS covers—locations, systems, teams, and exclusions. Draft it once you understand your context and refine it before certification. Keep it aligned with your risk register and SoA so auditors see a consistent boundary.

legal-and-contractual-requirements-register: |
  Tracks laws, regulations, and customer contracts that impose security or privacy obligations. Populate it during discovery and review it whenever you enter new markets or sign major contracts. Use it to drive control selection and prove compliance awareness.

physical-and-virtual-assets-register: |
  Lists hardware, cloud resources, and other infrastructure that supports your business. Build it alongside asset discovery and keep owners assigned. Refer to it when assessing risks, planning backups, and deciding what belongs in scope.

data-asset-register-ropa: |
  Records personal and sensitive data you process, including lawful basis and retention where GDPR applies. Create it when mapping data flows and privacy impact. Link each entry to systems in your asset registers and to controls in your SoA.

software-license-assets-register: |
  Tracks licensed software, versions, and responsible owners. Use it to support patch management, access reviews, and vendor risk. Update it when you adopt, renew, or retire applications.

statement-of-applicability-iso-27002-2022-and-2013: |
  Your central record of which Annex A controls apply, are implemented, or are excluded—with justification. Complete it after your risk assessment and treat it as a living document. Auditors will cross-check it against policies, procedures, and evidence.

annual-risk-review-meeting-template: |
  Structures the yearly session where leadership revises risks, treatment plans, and ISMS performance. Schedule it before your management review or recertification cycle. Capture decisions, owners, and dates so improvements are traceable.

managment-review-team-meeting-agenda-template: |
  Guides the formal management review required by ISO 27001 clause 9.3. Use it at least once per year to assess ISMS suitability, adequacy, and effectiveness. Record inputs like audit results, incidents, and KPIs, then document actions and deadlines.

the-information-security-management-system-overview: |
  A concise narrative of how your ISMS works—policies, processes, roles, and improvement loops. Share it with new staff and auditors as an orientation document. Refresh it when you reorganise or materially change your control set.

information-security-manager-job-description: |
  Defines the ISMS owner’s responsibilities, authority, and reporting line. Assign or hire against this role before you claim ISO 27001 leadership accountability. Review it when governance structures change.

competency-matrix: |
  Maps required security skills and training to roles across the organisation. Build it after policies are drafted so you know who must understand what. Use it to plan awareness sessions and to evidence competence at audit.

isms-rasci-matrix-basic-accountability-matrix: |
  A lightweight view of who is Responsible, Accountable, Supported, Consulted, or Informed for core ISMS activities. Fill it when roles are first assigned. Refer to it to resolve ownership gaps before audits.

isms-rasci-matrix-full: |
  An expanded RACI covering detailed ISMS tasks and control ownership. Develop it once basic accountability is clear and you need finer delegation. Keep it synced with job descriptions and process documents.

information-classification-summary: |
  Explains your classification scheme—labels, handling rules, and examples. Publish it after your classification policy is approved. Train staff to apply labels consistently on documents, email, and systems.

information-security-management-system-document-tracker: |
  Your master index of ISMS documents—version, owner, review date, and status. Maintain it from day one so nothing goes stale unnoticed. Auditors expect to see controlled document management here.

operations-security-manual-v1: |
  Day-to-day operational security guidance for IT and support teams. Implement it once core policies exist and procedures are defined. Use it as the practical companion to high-level policies during daily work.

how-to-access-control-and-role-based-access: |
  Walks administrators through granting, reviewing, and revoking access using your RBAC model. Follow it when onboarding tools or training new admins. Keeps access changes consistent with your access control policy.

role-based-access-control: |
  Defines roles, permissions, and segregation-of-duties rules for your systems. Design it before rolling out the access request process. Review it when applications or organisational structure change.

access-request-form: |
  Standard form for requesting new or changed system access with manager approval. Use it for every access change instead of ad hoc tickets. Retain completed forms as audit evidence.

starter-leaver-mover-system-access-process: |
  End-to-end workflow for joiners, leavers, and role changers. Implement it with HR and IT from the first hire. Timely provisioning and deprovisioning is one of the most scrutinised controls at audit.

starter-leaver-mover-access-register: |
  Log of access changes tied to HR events. Record each starter, leaver, and mover action here. Review periodically to catch missed revocations.

threat-intelligence-process: |
  Describes how you collect, assess, and act on security threat information. Establish it once monitoring and incident response basics are in place. Feed relevant intel into risk reviews and patch prioritisation.

threat-intelligence-report-template: |
  Format for documenting periodic threat landscape summaries for leadership. Complete it on your defined cadence—monthly or quarterly. Link findings to risks or controls that need adjustment.

dp-01-data-protection-policy: |
  Sets principles for lawful, fair processing of personal data under GDPR and related law. Approve it before handling personal data at scale. Staff must acknowledge it; align procedures and registers to its requirements.

dp-02-data-retention-policy: |
  Defines how long you keep data and when you delete or anonymise it. Publish it alongside your data inventory and retention schedules. Apply it to backups and archives, not just live systems.

is-01-information-security-policy: |
  Your top-level commitment to protecting information—scope, objectives, and governance. Approve it first; all other IS policies should align with it. Communicate it organisation-wide and review it at least annually.

is-02-access-control-policy: |
  Rules for who may access information and systems, and under what conditions. Finalise it before implementing RBAC and access workflows. Auditors will test whether daily practice matches these rules.

is-03-asset-management-policy: |
  Requirements for identifying, owning, and protecting information assets throughout their lifecycle. Adopt it when you stand up asset registers. Ensures inventory, classification, and disposal are handled consistently.

is-04-risk-management-policy: |
  Establishes how you identify, assess, treat, and monitor information security risks. Approve it before your first formal risk assessment. It frames acceptance criteria and ties risk work to business objectives.

is-05-information-classification-and-handling-policy: |
  Defines classification levels and handling rules for information at rest and in transit. Issue it before rolling out labelling and secure sharing practices. Pair it with your classification summary and awareness training.

is-06-information-security-awareness-and-training-policy: |
  Commits to educating staff on security responsibilities and measuring effectiveness. Launch it with your awareness programme. Track completion and refresh training when threats or policies change.

is-07-acceptable-use-policy: |
  Sets expectations for appropriate use of company systems, data, and devices. Require acknowledgement from all users at onboarding. Enforce consistently; it underpins disciplinary and monitoring controls.

is-08-clear-desk-and-clear-screen-policy: |
  Requires physical and screen privacy to reduce unauthorised disclosure. Roll it out in office and remote settings. Simple to audit visually—make sure facilities and culture support compliance.

is-09a-mobile-and-teleworking-policy-office-based: |
  Security rules for staff who mainly work on-site but may work remotely occasionally. Choose this variant if hybrid is your norm. Cover device use, VPN, and home network expectations.

is-09b-mobile-and-teleworking-policy-fully-remote: |
  Security rules for organisations where most staff work remotely. Use this if remote-first is your operating model. Address home offices, travel, and endpoint protection explicitly.

is-10-business-continuity-policy: |
  Commits to maintaining critical services during disruptions. Approve it before detailed BCP and BIA work. Sets recovery objectives that your continuity plans must meet.

is-11-backup-policy: |
  Defines what is backed up, how often, where copies live, and how restores are tested. Implement with your backup tooling and DR plans. Failed restores are a common audit finding—test regularly.

is-12-protection-against-malware-policy: |
  Requires anti-malware controls on endpoints, email, and servers. Align it with your chosen tooling and patch process. Verify coverage and update signatures or EDR policies continuously.

is-13-change-management-policy: |
  Governs how changes to systems and infrastructure are requested, approved, and recorded. Essential before production changes scale up. Pair with your change log and CAB practices.

is-14-third-party-supplier-security-policy: |
  Sets security expectations for vendors who access your data or systems. Use it in procurement and contract clauses. Drive supplier register reviews and due diligence from this policy.

is-15-continual-improvement-policy: |
  Describes how you capture feedback, correct nonconformities, and improve the ISMS. Activate it once audits and incidents begin producing actions. Links to corrective action logs and management review.

is-16-logging-and-monitoring-policy: |
  Defines what events you log, retention periods, and who reviews alerts. Implement alongside SIEM or log aggregation. Supports incident detection and forensic investigations.

is-17-network-security-management-policy: |
  Controls for segmentation, firewalls, wireless, and remote access. Align it with your network diagram and architecture. Review when infrastructure or cloud footprint changes.

is-18-information-transfer-policy: |
  Rules for sharing information inside and outside the organisation securely. Apply before enabling file sharing, email encryption, or API integrations. Covers physical media and electronic transfer alike.

is-19-secure-development-policy: |
  Security requirements for software you build or materially customise. Adopt it before SDLC hardening or DevSecOps tooling. Covers coding standards, testing, and separation of environments.

is-20-physical-and-environmental-security-policy: |
  Protects offices, data centres, and equipment from unauthorised access and environmental harm. Relevant for any on-premise or co-located assets. Coordinate with facilities on access badges and visitor procedures.

is-21-cryptographic-key-management-policy: |
  Governs generation, storage, rotation, and destruction of cryptographic keys. Required when you manage encryption keys in-house. Prevents weak or orphaned keys undermining encryption controls.

is-22-cryptographic-control-and-encryption-policy: |
  Specifies when and how encryption protects data in transit and at rest. Align with legal requirements and classification levels. Document algorithms and exceptions clearly for auditors.

is-23-document-and-record-policy: |
  Rules for creating, approving, versioning, and retaining ISMS documents and records. Implement early so your document tracker and change log have teeth. Auditors check document control rigour closely.

is-24-significant-incident-policy-and-collection-of-evidence: |
  Defines major incidents, escalation, and forensic evidence handling. Publish before your incident forms and playbooks go live. Ensures legal admissibility and regulatory notification where required.

is-25-patch-management-policy: |
  Commitment to timely patching of operating systems and applications. Tie it to vulnerability scanning and change management. Track SLAs by severity and evidence deployment.

is-26-cloud-service-policy: |
  Security requirements for adopting and operating cloud services. Use when moving workloads to SaaS, PaaS, or IaaS. Covers shared responsibility, configuration, and exit planning.

is-27-intellectual-property-rights-policy: |
  Protects company IP and respects third-party licences and copyrights. Important for teams handling code, designs, or licensed content. Supports contractual and legal compliance beyond pure security.

is-28-ai-policy: |
  Governs acceptable and secure use of AI tools and models in your organisation. Adopt before widespread adoption of generative AI. Address data leakage, bias, vendor risk, and human oversight.

audit-plan-iso-27002-2013-and-2022-version: |
  Schedules internal audits—scope, criteria, auditors, and timing—for the certification cycle. Build it after your ISMS is operational enough to audit. ISO 27001 expects a risk-based audit programme covering all requirements over time.

change-log: |
  Records material changes to ISMS documents and key system configurations. Update it whenever you revise policies or implement significant technical change. Provides traceability auditors expect.

communication-plan: |
  Defines how you communicate ISMS matters internally and externally—awareness, incidents, and regulatory contact. Finalise it alongside your top-level security policy rollout. Ensures stakeholders hear the right message at the right time.

isms-management-plan: |
  Your implementation and maintenance plan—milestones, resources, and priorities for the ISMS. Draft it during project kick-off and refresh after management review. Shows auditors you manage the programme deliberately.

incident-and-breach-reporting-form: |
  Standard form for staff to report security events and suspected breaches. Make it easy to find and train everyone to use it. Triggers your incident process and evidence collection.

incident-and-corrective-action-log: |
  Central register of incidents, root causes, actions taken, and closure status. Log every reportable event here. Supports continual improvement and demonstrates closed-loop handling at audit.

ip-01-risk-management-procedure: |
  Step-by-step method for identifying assets, threats, vulnerabilities, and treatments. Follow it for initial and periodic risk assessments. Outputs feed your risk register and Statement of Applicability.

isms-risk-register: |
  Living list of identified risks, scores, owners, treatments, and residual status. Populate it from your first risk assessment and review at least annually. The SoA and audit evidence should trace back to entries here.

third-party-supplier-register: |
  Inventory of vendors with access to your data or critical services, plus risk tier and review dates. Build it during procurement onboarding. Reassess suppliers when contracts renew or incidents occur.

1a-blank-audit-template-iso-27002-2013-and-2022-version: |
  Empty checklist for planning and conducting internal audits against Annex A controls. Use it when you want full flexibility to map questions yourself. Suitable for experienced auditors tailoring scope per engagement.

1b-audit-template-iso-27002-2013-and-2022-version-pre-mapped: |
  Audit checklist with ISO 27002 control references pre-filled for faster fieldwork. Choose this for routine internal audits or pre-certification dry runs. Record findings and link them to corrective actions.

audit-meeting-template: |
  Agenda and notes structure for opening and closing audit meetings with auditees. Use at the start and end of each audit engagement. Sets expectations, confirms scope, and communicates findings formally.

audit-report-template: |
  Standard format for documenting audit scope, methodology, findings, and recommendations. Complete it after each internal or supplier audit. Management review and certification bodies rely on clear, actionable reports.

business-impact-assessment: |
  Analyses how disruptions affect critical activities, resources, and recovery priorities. Conduct it before writing detailed continuity plans. Identifies maximum tolerable downtime and dependencies.

business-impact-analysis-exec-summary: |
  Executive-readable summary of BIA results for leadership decisions and funding. Produce it after the detailed BIA is complete. Use it in management review to justify continuity investments.

business-continuity-objectives-and-strategy: |
  Sets recovery objectives and strategic approach—prevention, response, and recovery. Define it after your BIA so targets are evidence-based. Guides the structure of your business continuity plan.

business-continuity-plan: |
  Your master plan for maintaining or restoring critical operations during a disruption. Finalise it once objectives and strategies are agreed. Exercise it regularly and keep contact lists current.

business-continuity-incident-action-log: |
  Running log of actions taken during a live continuity or crisis event. Activate it when you invoke the BCP. Captures decisions and timestamps for post-incident review.

post-incident-review-form: |
  Structured debrief after incidents or continuity activations. Complete it within days of closure while memories are fresh. Drives corrective actions into your improvement process.

disaster-recovery-scenario-plans: |
  Technical recovery procedures for specific failure scenarios—site loss, ransomware, etc. Develop them for systems identified in the BIA. Align RTO/RPO with business continuity objectives.

disaster-recovery-scenario-test-template: |
  Plan and record a DR test for a chosen scenario. Schedule tests at least annually for critical systems. Document results, gaps, and remediation owners.

how-to-conduct-a-business-continuity-test: |
  Practical guide for planning, running, and evaluating BC exercises. Follow it before your first tabletop or live test. Helps facilitators keep tests realistic and measurable.

business-continuity-test-template: |
  Checklist and script for executing a continuity exercise. Use it to standardise test preparation and execution. Ensures roles, injects, and success criteria are defined upfront.

business-continuity-test-report-template: |
  Format for summarising test objectives, outcomes, and improvement actions. Complete it immediately after each exercise. Share with management review as evidence of preparedness.

business-continuity-plan-scenario: |
  A narrative scenario describing a disruption used to stress-test your BCP. Develop scenarios that reflect plausible threats to your organisation. Use them in tabletop exercises with leadership and IT.

business-continuity-scenario: |
  Alternative or supplementary scenario material for continuity training and tests. Rotate scenarios so teams do not rehearse only one event type. Update when your threat landscape or dependencies change.

business-continuity-test-report-findings: |
  Detailed findings log from continuity tests—gaps, strengths, and priorities. Attach or reference it from your formal test report. Track open findings until closed in your corrective action process.

architectural-schema: |
  High-level diagram of applications, data stores, integrations, and trust boundaries. Maintain it as systems evolve; link it to asset registers and network diagrams. Auditors use it to understand scope and control placement.

network-diagram: |
  Visual map of networks, subnets, firewalls, and key connectivity. Keep it current after infrastructure changes. Supports network security policy reviews and incident response.
